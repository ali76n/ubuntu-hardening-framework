---

- name: Install security prerequisites
  ansible.builtin.apt:
    name:

      - sudo
      - openssh-server
      - python3
      - ca-certificates
      - apt-transport-https
      - unattended-upgrades
      - apt-listchanges
      - auditd
      - audispd-plugins
      - ufw
      - fail2ban
      - apparmor
      - apparmor-utils
      - apparmor-profiles
      - chrony
      - rsyslog
      - logrotate
      - aide
      - debsums
      - libpam-pwquality

    state: present

    update_cache: true

    cache_valid_time: 3600
